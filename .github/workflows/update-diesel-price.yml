name: Update Singapore Diesel Price

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 10am SGT (2am UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch diesel price from petrolprice.sg
        run: |
          # Primary source: petrolprice.sg (most accurate Singapore pump prices)
          PAGE=$(curl -s "https://petrolprice.sg/" -H "User-Agent: Mozilla/5.0")

          # Extract diesel prices - look for diesel section
          PRICE=$(echo "$PAGE" | grep -oP 'Diesel.*?\$(\d+\.\d+)' | grep -oP '\d+\.\d+' | head -1)

          # Fallback: try GlobalPetrolPrices
          if [ -z "$PRICE" ]; then
            PRICE=$(curl -s "https://www.globalpetrolprices.com/Singapore/diesel_prices/" \
              -H "User-Agent: Mozilla/5.0" | \
              grep -oP '\d+\.\d+(?= SGD)' | head -1)
            SOURCE="GlobalPetrolPrices.com"
          else
            SOURCE="petrolprice.sg"
          fi

          # If still empty, keep existing price
          if [ -z "$PRICE" ]; then
            echo "Could not fetch price, keeping existing"
            exit 0
          fi

          DATE=$(date -u +"%d %b %Y")
          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)

          cat > data/diesel-price.json << EOFJ
{
  "price": $PRICE,
  "currency": "SGD",
  "unit": "litre",
  "date": "$DATE",
  "source": "$SOURCE",
  "updated_at": "$UPDATED"
}
EOFJ

          echo "Updated diesel price: SGD $PRICE on $DATE from $SOURCE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/diesel-price.json
          git diff --staged --quiet || git commit -m "Auto-update diesel price: $(cat data/diesel-price.json | grep price | head -1)"
          git push
