name: Update Singapore Diesel Price

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 10am SGT (2am UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch diesel price
        run: |
          # Fetch from GlobalPetrolPrices.com Singapore diesel page
          PRICE=$(curl -s "https://www.globalpetrolprices.com/Singapore/diesel_prices/" \
            -H "User-Agent: Mozilla/5.0" | \
            grep -oP '(?<=<span id="graphPageGraph498">)\d+\.\d+' | head -1)

          # Fallback: try alternative pattern
          if [ -z "$PRICE" ]; then
            PRICE=$(curl -s "https://www.globalpetrolprices.com/Singapore/diesel_prices/" \
              -H "User-Agent: Mozilla/5.0" | \
              grep -oP '\d+\.\d+(?= SGD)' | head -1)
          fi

          # If still empty, keep existing price
          if [ -z "$PRICE" ]; then
            echo "Could not fetch price, keeping existing"
            exit 0
          fi

          DATE=$(date -u +"%d %b %Y")
          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)

          cat > data/diesel-price.json << EOF
          {
            "price": $PRICE,
            "currency": "SGD",
            "unit": "litre",
            "date": "$DATE",
            "source": "GlobalPetrolPrices.com",
            "updated_at": "$UPDATED"
          }
          EOF

          echo "Updated diesel price: SGD $PRICE on $DATE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/diesel-price.json
          git diff --staged --quiet || git commit -m "Update diesel price $(date +%Y-%m-%d)"
          git push
