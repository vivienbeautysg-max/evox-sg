name: Update Singapore Diesel Price

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 10am SGT (2am UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install puppeteer
        run: npm install puppeteer

      - name: Fetch diesel price with headless browser
        run: |
          node << 'NODESCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');

            let price = null;
            let source = '';

            // Source 1: GlobalPetrolPrices.com
            try {
              console.log('Trying GlobalPetrolPrices.com...');
              await page.goto('https://www.globalpetrolprices.com/Singapore/diesel_prices/', {
                waitUntil: 'networkidle2',
                timeout: 30000
              });
              // Wait for price to render
              await page.waitForSelector('body', { timeout: 5000 });
              await new Promise(r => setTimeout(r, 3000));

              // Extract the current price in SGD
              const text = await page.evaluate(() => document.body.innerText);

              // Look for "SGD X.XX per liter" or "current price" pattern
              const match1 = text.match(/SGD\s+(\d+\.\d+)\s+per\s+lit/i);
              const match2 = text.match(/current\s+price\s+(\d+\.\d+)/i);
              const match3 = text.match(/Price\s*\(SGD\/Liter\)[\s\S]*?current\s+price\s+(\d+\.\d+)/i);
              // Also try the table: "Current price    X.XX"
              const match4 = text.match(/Current price\s+(\d+\.\d+)/);
              // SGD table value
              const match5 = text.match(/Price \(SGD\/Liter\)[\s\S]*?(\d+\.\d+)/);

              const found = match1 || match2 || match3 || match4 || match5;
              if (found) {
                const val = parseFloat(found[1]);
                if (val >= 1.0 && val <= 10.0) {
                  price = val;
                  source = 'GlobalPetrolPrices.com';
                  console.log('Found price: SGD ' + price);
                }
              }

              if (!price) {
                // Try direct table extraction
                const tablePrice = await page.evaluate(() => {
                  const rows = document.querySelectorAll('table tr');
                  for (const row of rows) {
                    const cells = row.querySelectorAll('td');
                    for (const cell of cells) {
                      const t = cell.textContent.trim();
                      if (t === 'Current price') {
                        const next = cell.nextElementSibling;
                        if (next) {
                          const num = parseFloat(next.textContent.trim());
                          if (num >= 1.0 && num <= 10.0) return num;
                        }
                      }
                    }
                  }
                  return null;
                });
                if (tablePrice) {
                  price = tablePrice;
                  source = 'GlobalPetrolPrices.com';
                  console.log('Found from table: SGD ' + price);
                }
              }
            } catch (e) {
              console.log('GlobalPetrolPrices error: ' + e.message);
            }

            // Source 2: petrolprice.sg (backup - actual pump prices)
            if (!price) {
              try {
                console.log('Trying petrolprice.sg...');
                await page.goto('https://petrolprice.sg/', {
                  waitUntil: 'networkidle2',
                  timeout: 30000
                });
                await new Promise(r => setTimeout(r, 3000));
                const text2 = await page.evaluate(() => document.body.innerText);
                const dieselMatch = text2.match(/Diesel[\s\S]*?\$(\d+\.\d+)/);
                if (dieselMatch) {
                  const val = parseFloat(dieselMatch[1]);
                  if (val >= 1.0 && val <= 10.0) {
                    price = val;
                    source = 'petrolprice.sg';
                    console.log('Found from petrolprice.sg: SGD ' + price);
                  }
                }
              } catch (e) {
                console.log('petrolprice.sg error: ' + e.message);
              }
            }

            await browser.close();

            if (!price) {
              console.log('Could not fetch price from any source, keeping existing');
              process.exit(0);
            }

            const now = new Date();
            const data = {
              price: price,
              currency: 'SGD',
              unit: 'litre',
              date: now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
              source: source,
              updated_at: now.toISOString()
            };

            fs.writeFileSync('data/diesel-price.json', JSON.stringify(data, null, 2) + '\n');
            console.log('Saved:', JSON.stringify(data));
          })();
          NODESCRIPT

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/diesel-price.json
          if git diff --staged --quiet; then
            echo "No price change, skipping commit"
          else
            PRICE=$(cat data/diesel-price.json | jq -r .price)
            SOURCE=$(cat data/diesel-price.json | jq -r .source)
            git commit -m "Auto-update diesel: S\$$PRICE/L from $SOURCE"
            git push
          fi
